<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HouPhone Shop</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F8F9FB;
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      html.dark #splash {
        background: #0B1120;
      }
      #splash.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      #splash img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        animation: pulse-logo 1.8s ease-in-out infinite;
      }
      #splash .brand {
        margin-top: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #1E293B;
        letter-spacing: -0.02em;
      }
      html.dark #splash .brand {
        color: #E8ECF2;
      }
      #splash .subtitle {
        margin-top: 4px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 11px;
        font-weight: 500;
        color: #9CA3AF;
        letter-spacing: 0.04em;
      }
      html.dark #splash .subtitle {
        color: #4B5C6E;
      }
      #splash .loader {
        margin-top: 28px;
        width: 32px;
        height: 3px;
        border-radius: 3px;
        background: #E5E7EB;
        overflow: hidden;
        position: relative;
      }
      html.dark #splash .loader {
        background: #1F2937;
      }
      #splash .loader::after {
        content: '';
        position: absolute;
        left: -40%;
        top: 0;
        width: 40%;
        height: 100%;
        border-radius: 3px;
        background: #1E293B;
        animation: loader-slide 1.2s ease-in-out infinite;
      }
      html.dark #splash .loader::after {
        background: #60A5FA;
      }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.8; }
      }
      @keyframes loader-slide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
    </style>
    <script>
      // Theme + custom logo must apply BEFORE first paint so the loading
      // animation and favicon match branding (React is not running yet).
      (function () {
        try {
          if (localStorage.getItem('shop_theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) { /* ignore */ }
        try {
          var customLogo = localStorage.getItem('shop_logo_data_url');
          if (customLogo && customLogo.indexOf('data:image/') === 0) {
            window.__SHOP_CUSTOM_LOGO__ = customLogo;
          }
        } catch (e) { /* ignore */ }
        try {
          var customName = localStorage.getItem('shop_name');
          if (customName && customName.trim()) {
            window.__SHOP_CUSTOM_NAME__ = customName.trim();
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="splash">
      <img id="splash-logo" src="/logo.png" alt="HouPhone Shop" />
      <div class="brand" id="splash-brand">HouPhone Shop</div>
      <div class="subtitle">MANAGEMENT SUITE</div>
      <div class="loader"></div>
    </div>
    <script>
      // Swap splash + tab icon to the cached custom logo as soon as the body exists.
      (function () {
        var logo = window.__SHOP_CUSTOM_LOGO__;
        var name = window.__SHOP_CUSTOM_NAME__;
        if (logo) {
          var img = document.getElementById('splash-logo');
          if (img) img.src = logo;
          var link = document.querySelector("link[rel='icon']");
          if (link) {
            link.type = 'image/png';
            link.href = logo;
          }
        }
        if (name) {
          var brand = document.getElementById('splash-brand');
          if (brand) brand.textContent = name;
          document.title = name;
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
